<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; padding: 20px; }
        .form-area { max-width: 500px; margin: 0 auto 30px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007bff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #218838; }

        /* ඉන්වොයිසියේ පෙනුම */
        #invoice-layout { background: white; width: 210mm; padding: 20mm; margin: auto; border: 1px solid #ddd; display: block; }
        .inv-header { border-bottom: 3px solid #333; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .inv-title { font-size: 32px; font-weight: bold; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { background-color: #333; color: white; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px; }
        .total-section { text-align: right; margin-top: 30px; font-size: 22px; font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>

<div class="form-area">
    <h2>විස්තර ඇතුළත් කරන්න</h2>
    <input type="text" id="shop" placeholder="ව්‍යාපාරයේ නම (Shop Name)">
    <input type="text" id="customer" placeholder="පාරිභෝගිකයාගේ නම">
    <input type="text" id="item" placeholder="භාණ්ඩයේ නම">
    <input type="number" id="price" placeholder="මිල (රුපියල්)">
    <input type="number" id="qty" placeholder="ප්‍රමාණය">
    <button onclick="makePDF()">ඉන්වොයිසිය සාදා PDF ලබාගන්න</button>
</div>

<div id="invoice-layout">
    <div class="inv-header">
        <div>
            <div class="inv-title">INVOICE</div>
            <h3 id="show-shop"></h3>
        </div>
        <div style="text-align: right;">
            <p>දිනය: <span id="show-date"></span></p>
        </div>
    </div>

    <div>
        <strong>ගෙවිය යුතු පාර්ශවය:</strong>
        <p id="show-cust"></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>විස්තරය</th>
                <th>මිල (රු.)</th>
                <th>ප්‍රමාණය</th>
                <th>එකතුව</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td id="show-item"></td>
                <td id="show-price"></td>
                <td id="show-qty"></td>
                <td id="show-total"></td>
            </tr>
        </tbody>
    </table>

    <div class="total-section">
        මුළු මුදල: රු. <span id="show-grand"></span>
    </div>
</div>

<script>
    function makePDF() {
        // අගයන් ලබා ගැනීම
        const shopVal = document.getElementById('shop').value;
        const custVal = document.getElementById('customer').value;
        const itemVal = document.getElementById('item').value;
        const priceVal = parseFloat(document.getElementById('price').value) || 0;
        const qtyVal = parseInt(document.getElementById('qty').value) || 1;
        const totalVal = priceVal * qtyVal;
        const dateVal = new Date().toLocaleDateString();

        // ඉන්වොයිසියට දත්ත ඇතුළත් කිරීම
        document.getElementById('show-shop').innerText = shopVal;
        document.getElementById('show-cust').innerText = custVal;
        document.getElementById('show-item').innerText = itemVal;
        document.getElementById('show-price').innerText = priceVal.toFixed(2);
        document.getElementById('show-qty').innerText = qtyVal;
        document.getElementById('show-total').innerText = totalVal.toFixed(2);
        document.getElementById('show-grand').innerText = totalVal.toFixed(2);
        document.getElementById('show-date').innerText = dateVal;

        // PDF එක සෑදීම
        const element = document.getElementById('invoice-layout');
        const options = {
            margin: 0.5,
            filename: custVal + '_Invoice.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        
        html2pdf().set(options).from(element).save();
    }
</script>

</body>
</html>
