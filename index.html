<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuresh Invoice Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .invoice-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 25px; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
    </style>
</head>
<body>

<div class="invoice-box">
    <h2>ඉන්වොයිස් ජෙනරේටර්</h2>
    
    <label>පාරිභෝගිකයාගේ නම:</label>
    <input type="text" id="name" placeholder="නම ඇතුළත් කරන්න">

    <label>භාණ්ඩයේ විස්තරය:</label>
    <input type="text" id="item" placeholder="භාණ්ඩයේ නම">

    <label>මිල (රුපියල්):</label>
    <input type="number" id="price" placeholder="0.00">

    <label>ප්‍රමාණය:</label>
    <input type="number" id="qty" placeholder="1">

    <button onclick="generatePDF()">PDF එකක් ලබාගන්න</button>
</div>

<script>
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const name = document.getElementById('name').value;
        const item = document.getElementById('item').value;
        const price = document.getElementById('price').value;
        const qty = document.getElementById('qty').value;
        const total = price * qty;

        // PDF එකේ අන්තර්ගතය සැකසීම
        doc.setFontSize(22);
        doc.text("INVOICE", 105, 20, { align: 'center' });
        
        doc.setFontSize(12);
        doc.text("පාරිභෝගිකයා: " + name, 20, 40);
        doc.text("------------------------------------------", 20, 45);
        doc.text("භාණ්ඩය: " + item, 20, 55);
        doc.text("ඒකක මිල: රු. " + price, 20, 65);
        doc.text("ප්‍රමාණය: " + qty, 20, 75);
        doc.text("------------------------------------------", 20, 80);
        
        doc.setFontSize(14);
        doc.text("මුළු එකතුව: රු. " + total + ".00", 20, 95);

        // PDF එක සේව් කිරීම
        doc.save(name + "_invoice.pdf");
    }
</script>

</body>
</html>
