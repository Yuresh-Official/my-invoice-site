<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto Parts Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --invoice-width: 794px; 
            --invoice-height: 1123px; 
            --primary-color: #1a73e8; 
            --secondary-color: #f8f9fa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: #e9ecef; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .no-print-area { width: 100%; max-width: 900px; margin-bottom: 20px; }
        .download-btn { width: 100%; background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .download-btn:hover { background: #1557b0; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.4); }

        .main-container { display: flex; gap: 20px; width: 100%; max-width: 1250px; justify-content: center; }

        #invoice-wrapper { 
            background: white; 
            width: var(--invoice-width); 
            height: var(--invoice-height); /* Fixed Height to prevent overflow */
            padding: 0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .top-stripe { background: var(--primary-color); height: 15px; width: 100%; flex-shrink: 0; }
        
        .header { padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; background: var(--secondary-color); border-bottom: 1px solid #dee2e6; flex-shrink: 0; }
        .company-info h1 { font-size: 28px; font-weight: 800; color: #202124; text-transform: uppercase; margin-bottom: 5px; }
        .company-info p { font-size: 12px; color: #5f6368; font-weight: 600; line-height: 1.5; }
        
        .logo-container { width: 80px; height: 80px; border: 2px dashed #1a73e8; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background: #fff; }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .client-info { padding: 20px 40px; display: flex; justify-content: space-between; font-size: 14px; background: #fff; flex-shrink: 0; }
        .input-line { border: none; border-bottom: 2px solid #eee; outline: none; padding: 5px 0; font-weight: 700; width: 250px; font-size: 15px; }

        /* Scrollable but contained table area */
        .table-content { flex-grow: 1; overflow: hidden; padding: 0 0 20px 0; }
        .items-table { width: 100%; border-collapse: collapse; }
        .items-table th { background: #202124; color: #fff; padding: 12px 10px; font-size: 13px; text-transform: uppercase; position: sticky; top: 0; }
        .items-table td { padding: 8px 10px; border-bottom: 1px solid #f1f3f4; text-align: center; }
        
        .item-input { border: none; width: 100%; outline: none; font-size: inherit; font-weight: 500; background: transparent; }
        .num-input { width: 70px; padding: 5px; border: 1px solid #dadce0; border-radius: 4px; text-align: center; font-size: inherit; }

        .add-row { margin: 15px 40px; background: #34a853; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .footer { padding: 20px 40px 40px; display: flex; justify-content: flex-end; flex-shrink: 0; }
        .total-container { background: var(--secondary-color); border-left: 5px solid var(--primary-color); padding: 15px 25px; width: 250px; text-align: right; }
        .total-amount { font-size: 24px; font-weight: 900; color: var(--primary-color); }

        /* Dynamic Sizing Classes */
        .font-small td, .font-small input { font-size: 12px !important; }
        .font-xsmall td, .font-xsmall input { font-size: 10px !important; padding: 4px 10px !important; }

        .pdf-mode .add-row, .pdf-mode .logo-placeholder { display: none !important; }
        .pdf-mode .num-input { border: none !important; }
    </style>
</head>
<body>

    <div class="no-print-area">
        <button class="download-btn" onclick="generatePDF()">DOWNLOAD HIGH-QUALITY PDF</button>
    </div>

    <div class="main-container">
        <div id="invoice-wrapper">
            <div class="top-stripe"></div>
            <div class="header">
                <div class="company-info">
                    <h1>KUMARA AUTO MOBILE</h1>
                    <p>DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS</p>
                    <p>Tel: 0565762783 | UAE</p>
                </div>
                <div class="logo-container" onclick="document.getElementById('logo-input').click()">
                    <span class="logo-placeholder" style="font-size: 10px; text-align: center;">Add Logo</span>
                    <img id="logo-img" src="" alt="Logo">
                    <input type="file" id="logo-input" accept="image/*" style="display: none;" onchange="loadLogo(event)">
                </div>
            </div>

            <div class="client-info">
                <div>
                    <label style="display:block; font-size:11px; color:#1a73e8; font-weight:800;">BILL TO</label>
                    <input type="text" class="input-line" placeholder="Customer Name">
                </div>
                <div style="text-align: right;">
                    <label style="display:block; font-size:11px; color:#5f6368; font-weight:800;">DATE</label>
                    <input type="text" id="cur-date" class="input-line" style="width: 120px; text-align: right;">
                </div>
            </div>

            <div class="table-content">
                <table class="items-table" id="items-table">
                    <thead>
                        <tr>
                            <th width="50%">Description</th>
                            <th width="15%">Rate</th>
                            <th width="10%">Qty</th>
                            <th width="25%">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
                <button class="add-row no-print" onclick="addNewRow()">+ ADD NEW ITEM</button>
            </div>

            <div class="footer">
                <div class="total-container">
                    <span style="font-size: 12px; font-weight: bold; color: #5f6368;">GRAND TOTAL</span><br>
                    <span class="total-amount" id="final-total">0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('cur-date').value = new Date().toLocaleDateString();

        function loadLogo(event) {
            const image = document.getElementById('logo-img');
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { image.src = e.target.result; image.style.display = 'block'; }
                reader.readAsDataURL(file);
            }
        }

        function addNewRow() {
            const body = document.getElementById('table-body');
            const rowCount = body.rows.length;
            
            // Limit check is managed by font scaling
            const row = body.insertRow();
            row.innerHTML = `
                <td><input type="text" class="item-input" placeholder="Item description..."></td>
                <td><input type="number" class="num-input rate" value="0.00" oninput="calculate()"></td>
                <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                <td style="font-weight: bold; text-align: right; padding-right: 40px;"><span class="subtotal">0.00</span></td>
            `;
            updateTableStyle();
        }

        function updateTableStyle() {
            const table = document.getElementById('items-table');
            const rowCount = document.getElementById('table-body').rows.length;
            
            // Auto-scaling font size based on row count
            table.classList.remove('font-small', 'font-xsmall');
            if (rowCount > 10 && rowCount <= 18) {
                table.classList.add('font-small');
            } else if (rowCount > 18) {
                table.classList.add('font-xsmall');
            }
        }

        function calculate() {
            const rates = document.getElementsByClassName('rate');
            const qtys = document.getElementsByClassName('qty');
            const subs = document.getElementsByClassName('subtotal');
            let grand = 0;

            for(let i=0; i < rates.length; i++) {
                let val = (parseFloat(rates[i].value) || 0) * (parseFloat(qtys[i].value) || 0);
                subs[i].innerText = val.toFixed(2);
                grand += val;
            }
            document.getElementById('final-total').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            element.classList.add('pdf-mode');
            
            const opt = {
                margin: 0,
                filename: 'Kumara_Auto_Invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().from(element).set(opt).save().then(() => {
                element.classList.remove('pdf-mode');
            });
        }

        // Initialize with one row
        addNewRow();
    </script>
</body>
</html>
