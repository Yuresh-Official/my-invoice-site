<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Auto Parts Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* සියලුම default මායිම් ඉවත් කිරීම */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; padding: 20px; }
        
        .no-print { max-width: 800px; margin: 0 auto 20px auto; }
        .download-btn { width: 100%; background: #1a56db; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        
        /* ඉන්වොයිස් එකේ wrapper එක */
        .invoice-wrapper { 
            width: 800px; 
            margin: 0 auto; /* වෙබ් එකේදී මැදට පෙන්වීමට */
            background: #fff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            overflow: hidden;
        }

        /* කළු පාට Header එක */
        .black-header { 
            background: #000 !important; 
            color: #fff !important; 
            padding: 45px 20px; 
            text-align: center; 
            position: relative;
            width: 100%;
            -webkit-print-color-adjust: exact;
        }
        
        .company-name { font-size: 30px; font-weight: 800; color: white; text-align: center; border: none; background: transparent; width: 100%; outline: none; text-transform: uppercase; }
        .company-sub { font-size: 13px; color: #bbb; text-align: center; border: none; background: transparent; width: 100%; margin-top: 10px; }
        .company-tel { font-size: 18px; font-weight: bold; color: white; text-align: center; border: none; background: transparent; width: 100%; margin-top: 5px; }
        .location-tag { position: absolute; right: 30px; bottom: 20px; font-size: 26px; font-weight: 800; color: white; }

        .content-area { padding: 40px; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 30px; }
        .info-input { border: none; outline: none; font-size: 16px; background: transparent; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #000 !important; color: white !important; padding: 12px; text-align: left; -webkit-print-color-adjust: exact; }
        td { border-bottom: 1px solid #eee; padding: 15px 12px; }
        
        input.table-input { border: none; width: 100%; font-size: 14px; outline: none; }
        .add-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        
        .totals { margin-top: 50px; text-align: right; border-top: 2px solid #000; padding-top: 20px; }
        .total-text { font-size: 24px; font-weight: bold; }

        /* PDF එක සෑදීමේදී බලපාන විශේෂ නීති */
        @media print {
            body { padding: 0; background: none; }
            .invoice-wrapper { width: 100%; box-shadow: none; margin: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <button class="download-btn" onclick="downloadPDF()">DOWNLOAD PDF INVOICE</button>
    </div>

    <div class="invoice-wrapper" id="invoice">
        <div class="black-header">
            <input type="text" class="company-name" value="KUMARA AUTO MOBILE">
            <input type="text" class="company-sub" value="DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS">
            <input type="text" class="company-tel" value="Tel : 0565762783">
            <div class="location-tag">UAE</div>
        </div>

        <div class="content-area">
            <div class="info-row">
                <span>M/s: <input type="text" class="info-input" placeholder="Customer Name" style="width: 350px;"></span>
                <span>Date: <input type="text" id="date" class="info-input" style="width: 120px; text-align: right;"></span>
            </div>

            <table>
                <thead>
                    <tr>
                        <th width="50%">Description</th>
                        <th width="15%">Rate</th>
                        <th width="15%">Qty</th>
                        <th width="20%" style="text-align: right;">Amount</th>
                    </tr>
                </thead>
                <tbody id="item-body">
                    <tr>
                        <td><input type="text" class="table-input" placeholder="Item description..."></td>
                        <td><input type="number" class="table-input rate" placeholder="0.00" oninput="calc()"></td>
                        <td><input type="number" class="table-input qty" placeholder="1" oninput="calc()"></td>
                        <td style="text-align: right; font-weight: bold;"><span class="row-total">0.00</span></td>
                    </tr>
                </tbody>
            </table>

            <button class="add-btn no-print" onclick="addRow()">+ Add New Item</button>

            <div class="totals">
                <span class="total-text">Total Amount: <span id="grand-total">0.00</span></span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('date').value = new Date().toLocaleDateString();

        function addRow() {
            let row = document.getElementById('item-body').insertRow();
            row.innerHTML = `
                <td><input type="text" class="table-input" placeholder="Item description..."></td>
                <td><input type="number" class="table-input rate" placeholder="0.00" oninput="calc()"></td>
                <td><input type="number" class="table-input qty" placeholder="1" oninput="calc()"></td>
                <td style="text-align: right; font-weight: bold;"><span class="row-total">0.00</span></td>
            `;
        }

        function calc() {
            let rates = document.getElementsByClassName('rate');
            let qtys = document.getElementsByClassName('qty');
            let sums = document.getElementsByClassName('row-total');
            let total = 0;
            for(let i=0; i<rates.length; i++) {
                let s = (parseFloat(rates[i].value) || 0) * (parseFloat(qtys[i].value) || 0);
                sums[i].innerText = s.toFixed(2);
                total += s;
            }
            document.getElementById('grand-total').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function downloadPDF() {
            const element = document.getElementById('invoice');
            
            // වැදගත්: PDF එකේ මායිම් නැති කිරීමට පහත අගයන් භාවිතා කරන්න
            const opt = {
                margin: [0, 0, 0, 0], // වම, දකුණ, උඩ, යට සියල්ල බිංදුව කරන්න
                filename: 'Invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 3, 
                    useCORS: true, 
                    letterRendering: true,
                    x: 0, // කැන්වසය හරියටම බිංදුවෙන් පටන් ගන්න
                    scrollX: 0,
                    scrollY: 0
                },
                jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
