<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Auto Parts Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* PDF එකට බලපාන ප්‍රධාන සැකසුම් */
        :root { --invoice-width: 794px; --invoice-height: 1123px; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .no-print { width: 100%; max-width: 900px; margin-bottom: 20px; }
        .download-btn { width: 100%; background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }

        .main-container { display: flex; gap: 20px; width: 100%; max-width: 1250px; justify-content: center; }

        /* Invoice Container - මෙහි ප්‍රමාණය A4 වලට ස්ථාවර කර ඇත */
        #invoice-wrapper { 
            background: white; 
            width: var(--invoice-width); 
            min-height: var(--invoice-height); 
            padding: 0; 
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            overflow: hidden; /* පිටතට පැනීම වැළැක්වීමට */
        }

        /* LIVE PREVIEW BOX */
        .preview-box { width: 300px; height: 424px; border: 2px solid #ccc; border-radius: 8px; position: sticky; top: 20px; background: #fff; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .preview-content { transform: scale(0.37); transform-origin: top left; pointer-events: none; }

        /* Invoice UI Styles */
        .top-stripe { background: #000; height: 12px; width: 100%; }
        .header { padding: 40px; display: flex; justify-content: space-between; }
        .company-info h1 { font-size: 26px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .company-info p { font-size: 11px; color: #444; font-weight: 600; line-height: 1.4; }
        .inv-text { font-size: 40px; font-weight: 900; color: #f0f0f0; }

        .client-info { padding: 0 40px; margin-bottom: 30px; display: flex; justify-content: space-between; font-size: 14px; }
        .input-line { border: none; border-bottom: 1px solid #ddd; outline: none; padding: 2px; font-weight: bold; width: 220px; }

        .items-table { width: 100%; border-collapse: collapse; }
        .items-table th { background: #f9f9f9; border-top: 2px solid #000; border-bottom: 2px solid #000; padding: 12px 40px; text-align: left; font-size: 12px; }
        .items-table td { padding: 12px 40px; border-bottom: 1px solid #eee; }
        
        .item-input { border: none; width: 100%; outline: none; font-size: 14px; }
        .num-input { width: 70px; padding: 5px; border: 1px solid #eee; border-radius: 4px; text-align: center; }

        .add-row { margin: 20px 40px; background: #28a745; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .footer { margin-top: 50px; padding: 0 40px 40px; display: flex; justify-content: flex-end; }
        .total-box { background: #000; color: #fff; padding: 15px 30px; border-radius: 6px; display: flex; align-items: center; gap: 20px; }
        .total-box span { font-size: 16px; font-weight: 600; }
        .total-box strong { font-size: 24px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="no-print">
        <button class="download-btn" onclick="generatePDF()">DOWNLOAD PDF INVOICE</button>
    </div>

    <div class="main-container">
        <div id="invoice-wrapper">
            <div class="top-stripe"></div>
            <div class="header">
                <div class="company-info">
                    <h1>KUMARA AUTO MOBILE</h1>
                    <p>DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS</p>
                    <p>Tel: 0565762783 | UAE</p>
                </div>
                <div class="inv-text">INVOICE</div>
            </div>

            <div class="client-info">
                <div>M/s: <input type="text" class="input-line" placeholder="Enter Customer Name"></div>
                <div>Date: <input type="text" id="cur-date" class="input-line" style="width: 100px; text-align: right;"></div>
            </div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th width="50%">Description</th>
                        <th width="15%">Rate</th>
                        <th width="10%">Qty</th>
                        <th width="25%" style="text-align: right;">Amount</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td><input type="text" class="item-input" placeholder="Item description..."></td>
                        <td><input type="number" class="num-input rate" value="0" oninput="calculate()"></td>
                        <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                        <td align="right" style="font-weight: bold;"><span class="subtotal">0.00</span></td>
                    </tr>
                </tbody>
            </table>
            
            <button class="add-row no-print" onclick="addNewRow()">+ Add Item</button>

            <div class="footer">
                <div class="total-box">
                    <span>GRAND TOTAL:</span>
                    <strong id="final-total">0.00</strong>
                </div>
            </div>
        </div>

        <div class="preview-box no-print">
            <div style="background: #333; color: white; text-align: center; font-size: 12px; padding: 5px;">LIVE PREVIEW</div>
            <div id="preview-display" class="preview-content"></div>
        </div>
    </div>

    <script>
        document.getElementById('cur-date').value = new Date().toLocaleDateString();

        function addNewRow() {
            const body = document.getElementById('table-body');
            const row = body.insertRow();
            row.innerHTML = `
                <td><input type="text" class="item-input" placeholder="Item description..."></td>
                <td><input type="number" class="num-input rate" value="0" oninput="calculate()"></td>
                <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                <td align="right" style="font-weight: bold;"><span class="subtotal">0.00</span></td>
            `;
            syncPreview();
        }

        function calculate() {
            const rates = document.getElementsByClassName('rate');
            const qtys = document.getElementsByClassName('qty');
            const subs = document.getElementsByClassName('subtotal');
            let grand = 0;

            for(let i=0; i < rates.length; i++) {
                let val = (parseFloat(rates[i].value) || 0) * (parseFloat(qtys[i].value) || 0);
                subs[i].innerText = val.toFixed(2);
                grand += val;
            }
            document.getElementById('final-total').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
            syncPreview();
        }

        function syncPreview() {
            const clone = document.getElementById('invoice-wrapper').innerHTML;
            document.getElementById('preview-display').innerHTML = clone;
        }

        // මුලින්ම Preview එක පෙන්වීමට
        syncPreview();

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            
            // වැදගත්: මෙහි Scale එක 1 ට වඩා වැඩි කිරීමෙන් පැහැදිලි බව වැඩි වේ
            const opt = {
                margin: 0,
                filename: 'Kumara_Auto_Invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true,
                    logging: false,
                    letterRendering: true,
                    width: 794 // A4 width pixels
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().from(element).set(opt).save();
        }
    </script>
</body>
</html>
