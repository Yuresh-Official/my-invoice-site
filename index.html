<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Auto Parts Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* පාලක පැනලය (Input Section) */
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 900px; margin-bottom: 20px; }
        .download-btn { width: 100%; background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .download-btn:hover { background: #1557b0; }

        /* Main Container: Preview සහ Input දෙකම පෙනෙන ලෙස */
        .main-container { display: flex; gap: 20px; width: 100%; max-width: 1200px; align-items: flex-start; }

        /* ඉන්වොයිස් එක පෙනෙන කොටුව (The Actual Invoice) */
        #invoice-wrapper { background: white; width: 794px; min-height: 1123px; padding: 0; margin: 0; box-shadow: 0 0 10px rgba(0,0,0,0.2); transform-origin: top left; }

        /* කුඩා කොටුවකින් පෙනෙන Preview එක */
        .preview-box { width: 350px; height: 500px; overflow: hidden; border: 2px solid #ddd; border-radius: 8px; position: sticky; top: 20px; background: #eee; }
        .preview-content { transform: scale(0.43); transform-origin: top left; }

        /* Invoice Styles */
        .black-bar { background: #000; height: 15px; width: 100%; }
        .header { padding: 40px; display: flex; justify-content: space-between; align-items: flex-start; }
        .company-info h1 { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .company-info p { font-size: 12px; color: #555; font-weight: 600; max-width: 300px; }
        .invoice-tag { font-size: 45px; font-weight: 900; color: #f0f0f0; }

        .client-section { padding: 0 40px; margin-bottom: 30px; display: flex; justify-content: space-between; }
        .input-group { font-weight: bold; font-size: 16px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .input-group input { border: none; outline: none; font-size: 16px; font-weight: bold; width: 200px; }

        .items-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .items-table th { background: #f8f9fa; border-top: 2px solid #000; border-bottom: 2px solid #000; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; }
        .items-table td { padding: 15px; border-bottom: 1px solid #eee; }
        .item-input { border: none; width: 100%; font-size: 14px; outline: none; background: transparent; }
        .num-input { width: 80px; padding: 5px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }

        .add-row { margin: 20px 40px; background: #34a853; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .footer { margin-top: auto; padding: 40px; display: flex; justify-content: flex-end; }
        .total-card { background: #000; color: #fff; padding: 20px 40px; border-radius: 8px; text-align: right; }
        .total-card span { font-size: 18px; margin-right: 15px; }
        .total-card strong { font-size: 28px; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

    <div class="controls no-print">
        <button class="download-btn" onclick="generatePDF()">DOWNLOAD PDF INVOICE</button>
    </div>

    <div class="main-container">
        <div id="invoice-wrapper">
            <div class="black-bar"></div>
            <div class="header">
                <div class="company-info">
                    <h1>KUMARA AUTO MOBILE</h1>
                    <p>DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS</p>
                    <p style="margin-top: 5px;">Tel: 0565762783 | UAE</p>
                </div>
                <div class="invoice-tag">INVOICE</div>
            </div>

            <div class="client-section">
                <div class="input-group">M/s: <input type="text" placeholder="Customer Name"></div>
                <div class="input-group">Date: <input type="text" id="date-val"></div>
            </div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th width="50%">Description</th>
                        <th width="15%">Rate</th>
                        <th width="10%">Qty</th>
                        <th width="25%" style="text-align: right;">Amount</th>
                    </tr>
                </thead>
                <tbody id="item-body">
                    <tr>
                        <td><input type="text" class="item-input" placeholder="Enter item description..."></td>
                        <td><input type="number" class="num-input rate" value="0" oninput="calculate()"></td>
                        <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                        <td align="right" style="font-weight: bold;"><span class="subtotal">0.00</span></td>
                    </tr>
                </tbody>
            </table>
            
            <button class="add-row no-print" onclick="addRow()">+ Add New Item</button>

            <div class="footer">
                <div class="total-card">
                    <span>GRAND TOTAL:</span>
                    <strong id="grand-total">0.00</strong>
                </div>
            </div>
        </div>

        <div class="preview-box no-print">
            <p style="text-align: center; font-weight: bold; padding: 5px; background: #ddd;">LIVE PREVIEW</p>
            <div id="preview-container" class="preview-content">
                </div>
        </div>
    </div>

    <script>
        document.getElementById('date-val').value = new Date().toLocaleDateString();

        function addRow() {
            const row = document.getElementById('item-body').insertRow();
            row.innerHTML = `
                <td><input type="text" class="item-input" placeholder="Enter item description..."></td>
                <td><input type="number" class="num-input rate" value="0" oninput="calculate()"></td>
                <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                <td align="right" style="font-weight: bold;"><span class="subtotal">0.00</span></td>
            `;
            updatePreview();
        }

        function calculate() {
            const rates = document.getElementsByClassName('rate');
            const qtys = document.getElementsByClassName('qty');
            const subs = document.getElementsByClassName('subtotal');
            let total = 0;

            for(let i=0; i<rates.length; i++) {
                let s = (parseFloat(rates[i].value) || 0) * (parseFloat(qtys[i].value) || 0);
                subs[i].innerText = s.toFixed(2);
                total += s;
            }
            document.getElementById('grand-total').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
            updatePreview();
        }

        // Preview එක Update කරන function එක
        function updatePreview() {
            const content = document.getElementById('invoice-wrapper').innerHTML;
            document.getElementById('preview-container').innerHTML = content;
        }

        // මුලින්ම ප්ලීවීව් එක පෙන්වීමට
        updatePreview();

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            
            // PDF එකේ Quality එක සහ Size එක නිවැරදි කිරීමට මේ Settings වැදගත්
            const opt = {
                margin: 0,
                filename: 'Kumara_Auto_Invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true,
                    width: 794, // A4 pixel width
                    windowWidth: 794
                },
                jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
