<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumara Auto Mobile - Dynamic Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --primary-color: #1a2a3a; 
            --accent-color: #d35400;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .controls { 
            width: 100%; 
            max-width: 800px; 
            margin-bottom: 15px; 
            display: flex; 
            gap: 10px; 
        }

        .btn { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            text-transform: uppercase;
        }

        .btn-add { background: #2980b9; }
        .btn-download { background: #27ae60; }

        /* A4 Wrapper with Flex-Shrink logic */
        #invoice-wrapper { 
            background: white; 
            width: 210mm; 
            height: 297mm; 
            padding: 30px 40px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Container for content that needs to shrink */
        #scalable-content {
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: font-size 0.2s ease;
        }

        .header { 
            border-bottom: 2px solid var(--primary-color); 
            padding-bottom: 15px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .company-info { width: 70%; }
        
        /* Company name scaling */
        .editable-title { 
            font-size: 2.2em; 
            font-weight: 900; 
            color: #000; 
            border: none; 
            width: 100%; 
            outline: none; 
            text-transform: uppercase;
            display: block;
        }

        .editable-sub { 
            font-size: 0.9em; 
            color: #444; 
            border: none; 
            width: 100%; 
            outline: none; 
            font-weight: 600;
            margin-top: 2px;
        }

        .logo-box { 
            width: 100px; 
            height: 100px; 
            border: 1px dashed #ccc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
        }

        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .details-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 15px; 
        }

        .detail-box label { font-size: 0.75em; font-weight: 800; color: var(--accent-color); text-transform: uppercase; }
        .detail-box input { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 4px 0; font-size: 1em; outline: none; }

        /* Table Styles */
        #table-area { flex-grow: 1; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { 
            background: var(--primary-color); 
            color: white; 
            padding: 8px; 
            text-align: left; 
            font-size: 0.85em; 
            border: 1px solid #34495e;
        }
        td { padding: 4px; border: 1px solid #eee; }

        .item-desc { width: 100%; border: none; outline: none; background: transparent; font-size: 1em; }
        .item-num { width: 100%; border: none; padding: 4px; text-align: center; background: #f9f9f9; font-size: 1em; }

        /* Totals */
        .totals-area { margin-left: auto; width: 250px; margin-top: 10px; }
        .total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 1em; }
        .grand-total { 
            background: #f8f9fa; 
            padding: 10px; 
            border-left: 5px solid var(--accent-color); 
            font-weight: 800; 
            font-size: 1.3em;
        }

        .footer { 
            margin-top: 10px; 
            font-size: 0.7em; 
            color: #888; 
            text-align: center; 
            padding-top: 10px; 
            border-top: 1px solid #eee; 
        }

        .btn-remove { color: #e74c3c; cursor: pointer; border: none; background: none; font-weight: bold; }

        /* Hide elements for PDF */
        .pdf-mode .btn-remove, .pdf-mode .controls, .pdf-mode .logo-text { display: none !important; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn btn-add" onclick="addNewRow()">+ Add Item (أضف بند)</button>
        <button class="btn btn-download" onclick="generatePDF()">Download PDF (تحميل)</button>
    </div>

    <div id="invoice-wrapper">
        <div id="scalable-content">
            <div class="header">
                <div class="company-info">
                    <input type="text" class="editable-title" value="KUMARA AUTO MOBILE" oninput="autoScale()">
                    <input type="text" class="editable-sub" value="DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS">
                    <input type="text" class="editable-sub" value="قطع غيار الرافعات الشوكية والمعدات الثقيلة" style="color: #666;">
                    <input type="text" class="editable-sub" value="Tel: 0565762783 | UAE" style="color: #1a73e8;">
                </div>
                <div class="logo-box" onclick="document.getElementById('fileInput').click()">
                    <span class="logo-text" style="font-size: 10px; color: #999; text-align: center;">ADD LOGO<br>شعار</span>
                    <img id="logo-preview" style="display:none;">
                    <input type="file" id="fileInput" hidden onchange="previewImage(this)">
                </div>
            </div>

            <div class="details-grid">
                <div class="detail-box">
                    <label>Customer Name / الاسم (Bill To)</label>
                    <input type="text" placeholder="Enter name">
                </div>
                <div class="detail-box" style="text-align: right;">
                    <label>Date / التاريخ</label>
                    <input type="text" id="currentDate">
                </div>
            </div>

            <div id="table-area">
                <table id="invoiceTable">
                    <thead>
                        <tr>
                            <th style="width: 50%;">DESCRIPTION / الوصف</th>
                            <th style="width: 15%;">RATE / السعر</th>
                            <th style="width: 10%;">QTY / الكمية</th>
                            <th style="width: 20%; text-align: right;">AMOUNT / المبلغ</th>
                            <th style="width: 5%;" class="btn-remove"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>

            <div class="totals-area">
                <div class="total-row grand-total">
                    <span>TOTAL (الإجمالي)</span>
                    <span id="grandTotal">0.00</span>
                </div>
            </div>

            <div class="footer">
                <p>THANK YOU FOR YOUR BUSINESS | شكرا لتعاملكم معنا</p>
                <p>No Return, No Exchange without Invoice</p>
            </div>
        </div>
    </div>

    <script>
        // Set Today's Date
        document.getElementById('currentDate').value = new Date().toLocaleDateString('en-GB');

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('logo-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.querySelector('.logo-text').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addNewRow() {
            const tbody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="item-desc" placeholder="Spare part name..."></td>
                <td><input type="number" class="item-num rate" value="0.00" oninput="updateCalculation()"></td>
                <td><input type="number" class="item-num qty" value="1" oninput="updateCalculation()"></td>
                <td style="text-align: right; font-weight: bold;"><span class="subtotal">0.00</span></td>
                <td class="btn-remove"><button onclick="this.parentElement.parentElement.remove(); updateCalculation();" class="btn-remove">×</button></td>
            `;
            tbody.appendChild(row);
            autoScale();
        }

        function updateCalculation() {
            let total = 0;
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(row => {
                const rate = parseFloat(row.querySelector('.rate').value) || 0;
                const qty = parseFloat(row.querySelector('.qty').value) || 0;
                const sub = rate * qty;
                row.querySelector('.subtotal').innerText = sub.toFixed(2);
                total += sub;
            });
            document.getElementById('grandTotal').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
            autoScale();
        }

        // --- THE MAGIC AUTO-SCALE FUNCTION ---
        function autoScale() {
            const container = document.getElementById('scalable-content');
            const wrapper = document.getElementById('invoice-wrapper');
            let currentFontSize = 100; // start at 100% (or 16px)

            // Reset font size to measure real height
            container.style.fontSize = '16px';

            // While content height is bigger than A4 wrapper height, reduce font size
            while (container.scrollHeight > wrapper.clientHeight - 60 && currentFontSize > 30) {
                currentFontSize -= 2;
                container.style.fontSize = currentFontSize + '%';
            }
        }

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            document.body.classList.add('pdf-mode');
            
            const opt = {
                margin: 0,
                filename: 'Kumara_Auto_Invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().from(element).set(opt).save().then(() => {
                document.body.classList.remove('pdf-mode');
            });
        }

        // Initialize
        addNewRow();
    </script>
</body>
</html>
