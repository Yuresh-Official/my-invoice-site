<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumara Auto Mobile - Invoice Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --primary-color: #2c3e50; 
            --accent-color: #e67e22;
            --bg-color: #f4f7f6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }

        .controls { width: 100%; max-width: 800px; margin-bottom: 20px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-download { background: #27ae60; }
        .btn-add { background: #2980b9; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        #invoice-wrapper { 
            background: white; 
            width: 794px; 
            min-height: 1123px; 
            padding: 50px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Editable Header Section */
        .header { border-bottom: 3px solid var(--primary-color); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-start; }
        .company-info { width: 70%; }
        .editable-title { font-size: 32px; font-weight: 900; color: #000; border: none; width: 100%; outline: none; margin-bottom: 5px; text-transform: uppercase; }
        .editable-sub { font-size: 14px; color: #555; border: none; width: 100%; outline: none; display: block; margin-bottom: 3px; font-weight: 600; }

        .logo-box { width: 100px; height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        .detail-box label { font-size: 11px; font-weight: 800; color: var(--accent-color); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .detail-box input { width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 5px 0; font-size: 14px; outline: none; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th { background: var(--primary-color); color: white; padding: 12px; text-align: left; font-size: 13px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .item-desc { width: 100%; border: none; outline: none; font-size: 14px; }
        .item-num { width: 80px; border: 1px solid #eee; padding: 5px; text-align: center; border-radius: 3px; }

        .totals-area { margin-left: auto; width: 300px; }
        .total-row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #eee; }
        .grand-total { background: var(--bg-color); padding: 15px; border-left: 5px solid var(--accent-color); font-weight: 800; font-size: 20px; margin-top: 10px; }

        .pdf-mode .btn-remove, .pdf-mode .btn-add, .pdf-mode .logo-text { display: none !important; }
        .btn-remove { color: #e74c3c; cursor: pointer; font-weight: bold; border: none; background: none; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn btn-add" onclick="addNewRow()">+ අලුත් අයිතමයක් එක් කරන්න</button>
        <button class="btn btn-download" onclick="generatePDF()">INVOICE එක PDF ලෙස ලබාගන්න</button>
    </div>

    <div id="invoice-wrapper">
        <div class="header">
            <div class="company-info">
                <input type="text" class="editable-title" value="KUMARA AUTO MOBILE">
                <input type="text" class="editable-sub" value="DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS">
                <input type="text" class="editable-sub" value="Tel: 0565762783 | UAE" style="color: #1a73e8;">
            </div>
            <div class="logo-box" onclick="document.getElementById('fileInput').click()">
                <span class="logo-text" style="font-size: 10px; color: #999;">LOGO එකක්<br>එක් කරන්න</span>
                <img id="logo-preview" style="display:none;">
                <input type="file" id="fileInput" hidden onchange="previewImage(this)">
            </div>
        </div>

        <div class="details-grid">
            <div class="detail-box">
                <label>පාරිභෝගිකයා (Bill To)</label>
                <input type="text" placeholder="Customer Name / Company">
            </div>
            <div class="detail-box" style="text-align: right;">
                <label>දිනය (Date)</label>
                <input type="text" id="currentDate" style="text-align: right;">
            </div>
        </div>

        <table id="invoiceTable">
            <thead>
                <tr>
                    <th style="width: 45%;">විස්තරය (Description)</th>
                    <th style="width: 15%;">මිල (Rate)</th>
                    <th style="width: 10%;">ප්‍රමාණය (Qty)</th>
                    <th style="width: 20%; text-align: right;">එකතුව (Amount)</th>
                    <th style="width: 10%;" class="btn-remove"></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>

        <div class="totals-area">
            <div class="total-row grand-total">
                <span>මුළු එකතුව</span>
                <span id="grandTotal">0.00</span>
            </div>
        </div>

        <div style="margin-top: auto; font-size: 11px; color: #999; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
            Thank you for your business!
        </div>
    </div>

    <script>
        // දිනය ස්වයංක්‍රීයව සැකසීම
        document.getElementById('currentDate').value = new Date().toLocaleDateString();

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('logo-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.querySelector('.logo-text').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addNewRow() {
            const tbody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="item-desc" placeholder="Spare part name..."></td>
                <td><input type="number" class="item-num rate" value="0.00" oninput="updateCalculation()"></td>
                <td><input type="number" class="item-num qty" value="1" oninput="updateCalculation()"></td>
                <td style="text-align: right; font-weight: bold;"><span class="subtotal">0.00</span></td>
                <td class="btn-remove"><button onclick="this.parentElement.parentElement.remove(); updateCalculation();" class="btn-remove">✖</button></td>
            `;
            tbody.appendChild(row);
        }

        function updateCalculation() {
            let total = 0;
            const rows = document.querySelectorAll('#tableBody tr');
            
            rows.forEach(row => {
                const rate = parseFloat(row.querySelector('.rate').value) || 0;
                const qty = parseFloat(row.querySelector('.qty').value) || 0;
                const subtotal = rate * qty;
                row.querySelector('.subtotal').innerText = subtotal.toFixed(2);
                total += subtotal;
            });

            document.getElementById('grandTotal').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            const controls = document.querySelector('.controls');
            
            document.body.classList.add('pdf-mode');
            
            const opt = {
                margin: 0,
                filename: 'Kumara_Auto_Invoice.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().from(element).set(opt).save().then(() => {
                document.body.classList.remove('pdf-mode');
            });
        }

        // ආරම්භයේදී එක් පේළියක් එක් කරන්න
        addNewRow();
    </script>
</body>
</html>
