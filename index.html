<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuresh Invoice Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .main-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; }
        
        /* Invoice Design */
        #invoice-layout { padding: 40px; border: 1px solid #eee; margin-top: 20px; background: #fff; }
        .inv-header { border-bottom: 2px solid #333; display: flex; justify-content: space-between; margin-bottom: 20px; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #333; color: #fff; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .total-box { text-align: right; margin-top: 20px; font-size: 22px; font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 style="text-align: center; color: #007bff;">ඉන්වොයිස් සාදන්නා</h2>
    
    <div class="input-group">
        <input type="text" id="shop" placeholder="ව්‍යාපාරයේ නම">
        <input type="text" id="cust" placeholder="පාරිභෝගිකයාගේ නම">
        <input type="text" id="item" placeholder="භාණ්ඩයේ නම">
        <input type="number" id="price" placeholder="මිල (රුපියල්)">
        <input type="number" id="qty" placeholder="ප්‍රමාණය (Qty)" value="1">
    </div>

    <button onclick="generate()">ඉන්වොයිසිය PDF ලෙස ලබාගන්න</button>

    <div id="invoice-layout">
        <div class="inv-header">
            <div>
                <h1 style="margin:0;">INVOICE</h1>
                <h3 id="out-shop" style="color:#555;"></h3>
            </div>
            <div style="text-align: right;">
                <p>දිනය: <span id="out-date"></span></p>
            </div>
        </div>
        <p><strong>ගෙවිය යුතු පාර්ශවය:</strong> <span id="out-cust"></span></p>
        
        <table>
            <thead>
                <tr>
                    <th>විස්තරය</th>
                    <th>මිල (රු.)</th>
                    <th>ප්‍රමාණය</th>
                    <th>එකතුව</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="out-item">---</td>
                    <td id="out-price">0.00</td>
                    <td id="out-qty">0</td>
                    <td id="out-total">0.00</td>
                </tr>
            </tbody>
        </table>
        <div class="total-box">මුළු එකතුව: රු. <span id="out-grand">0.00</span></div>
    </div>
</div>

<script>
    function generate() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const qty = parseInt(document.getElementById('qty').value) || 0;
        const total = price * qty;

        document.getElementById('out-shop').innerText = document.getElementById('shop').value;
        document.getElementById('out-cust').innerText = document.getElementById('cust').value;
        document.getElementById('out-item').innerText = document.getElementById('item').value;
        document.getElementById('out-price').innerText = price.toFixed(2);
        document.getElementById('out-qty').innerText = qty;
        document.getElementById('out-total').innerText = total.toFixed(2);
        document.getElementById('out-grand').innerText = total.toFixed(2);
        document.getElementById('out-date').innerText = new Date().toLocaleDateString();

        const element = document.getElementById('invoice-layout');
        html2pdf().from(element).set({
            margin: 10,
            filename: 'Invoice.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { orientation: 'portrait' }
        }).save();
    }
</script>

</body>
</html>
