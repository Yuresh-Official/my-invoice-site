<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumara Auto Mobile - Dynamic Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1a2a3a; --accent: #d35400; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        .controls { width: 100%; max-width: 800px; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; min-width: 140px; }
        .btn-add { background: #2980b9; }
        .btn-download { background: #27ae60; }
        .btn-dev { background: #34495e; }

        .invoice-container { width: 100%; overflow-x: auto; display: flex; justify-content: flex-start; padding-bottom: 20px; }
        #invoice-wrapper { 
            background: white; width: 210mm; height: 297mm; padding: 30px 45px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; 
            overflow: hidden; position: relative; flex-shrink: 0;
        }

        #scalable-content { display: flex; flex-direction: column; height: 100%; transform-origin: top center; }

        /* Header Scaling */
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .company-info { width: 75%; overflow: hidden; }
        .editable-title { 
            font-size: 2.4em; font-weight: 900; color: #000; border: none; width: 100%; 
            outline: none; text-transform: uppercase; background: transparent;
            display: block; white-space: nowrap;
        }
        .editable-sub { font-size: 0.95em; color: #444; border: none; width: 100%; outline: none; font-weight: 600; margin-top: 2px; background: transparent; }

        .logo-box { width: 90px; height: 90px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Conditional Hiding */
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #fdfdfd; padding: 10px; border: 1px solid #eee; }
        .detail-box label { font-size: 0.75em; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .detail-box input { width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 2px 0; font-size: 1.05em; outline: none; background: transparent; }
        
        .pdf-mode .hide-if-empty { display: none !important; }

        #table-area { flex-grow: 1; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--primary); color: white; padding: 8px; text-align: left; font-size: 0.85em; border: 1px solid #34495e; }
        td { padding: 4px; border: 1px solid #eee; }

        .item-desc { width: 100%; border: none; outline: none; background: transparent; font-size: 1em; }
        .item-num { width: 100%; border: none; padding: 4px; text-align: center; background: #f9f9f9; font-size: 1.05em; font-weight: 600; }

        .totals-area { margin-left: auto; width: 280px; margin-top: 5px; }
        .total-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 1.1em; }
        .grand-total { background: #f8f9fa; padding: 10px; border-left: 6px solid var(--accent); font-weight: 900; font-size: 1.5em; color: var(--primary); }

        .footer { margin-top: auto; font-size: 0.8em; color: #555; text-align: center; padding-top: 10px; border-top: 1px solid #eee; }
        .warranty-input { border: none; border-bottom: 1px dashed #999; width: 40px; text-align: center; font-weight: bold; outline: none; background: transparent; }
        
        #devModal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; border-top: 12px solid var(--accent); }
        .close-btn { margin-top: 25px; background: var(--primary); color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; }

        .btn-remove { color: #e74c3c; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 1.2em; }
        .pdf-mode .btn-remove, .pdf-mode .controls, .pdf-mode .logo-text, .pdf-mode #devModal { display: none !important; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn btn-add" onclick="addNewRow()">+ Add Service</button>
        <button class="btn btn-download" onclick="generatePDF()">Download PDF</button>
        <button class="btn btn-dev" onclick="toggleModal()">Developer</button>
    </div>

    <div class="invoice-container">
        <div id="invoice-wrapper">
            <div id="scalable-content">
                <div class="header">
                    <div class="company-info" id="title-parent">
                        <input type="text" id="main-title" class="editable-title" value="KUMARA AUTO MOBILE" oninput="scaleHeaderTitle()">
                        <input type="text" class="editable-sub" value="DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS">
                        <input type="text" class="editable-sub" value="Tel: 0565762783 | UAE" style="color: #1a73e8;">
                    </div>
                    <div class="logo-box" onclick="document.getElementById('fileInput').click()">
                        <span class="logo-text" style="font-size: 10px; color: #999;">LOGO</span>
                        <img id="logo-preview" style="display:none;">
                        <input type="file" id="fileInput" hidden onchange="previewImage(this)">
                    </div>
                </div>

                <div class="details-grid">
                    <div class="detail-box" id="box-customer">
                        <label>Customer Name</label>
                        <input type="text" placeholder="Name" oninput="checkInput(this, 'box-customer')">
                    </div>
                    <div class="detail-box">
                        <label>Date</label>
                        <input type="text" id="currentDate">
                    </div>
                    <div class="detail-box" id="box-vno">
                        <label>Vehicle No</label>
                        <input type="text" placeholder="Enter No" oninput="checkInput(this, 'box-vno')">
                    </div>
                    <div class="detail-box" id="box-model" style="text-align: right;">
                        <label>Model</label>
                        <input type="text" placeholder="Enter Model" style="text-align: right;" oninput="checkInput(this, 'box-model')">
                    </div>
                </div>

                <div id="table-area">
                    <table id="invoiceTable">
                        <thead>
                            <tr>
                                <th style="width: 50%;">DESCRIPTION</th>
                                <th style="width: 15%;">RATE</th>
                                <th style="width: 10%;">QTY</th>
                                <th style="width: 20%; text-align: right;">AMOUNT</th>
                                <th style="width: 5%;" class="btn-remove"></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <div class="totals-area">
                    <div class="total-row grand-total">
                        <span>TOTAL</span>
                        <span id="grandTotal">0.00</span>
                    </div>
                </div>

                <div class="footer">
                    <p style="font-weight: bold; margin-bottom: 5px;">THANK YOU | شكරා لكم</p>
                    <p>Warranty: <input type="text" class="warranty-input" value="06"> Months</p>
                </div>
            </div>
        </div>
    </div>

    <div id="devModal">
        <div class="modal-content">
            <h2>DEVELOPER</h2>
            <p style="font-size: 20px; font-weight: 900; color: #d35400;">Yuresh Kavindu Sumanasinha</p>
            <button class="close-btn" onclick="toggleModal()">Close</button>
        </div>
    </div>

    <script>
        document.getElementById('currentDate').value = new Date().toLocaleDateString('en-GB');

        function toggleModal() {
            const modal = document.getElementById('devModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function scaleHeaderTitle() {
            const title = document.getElementById('main-title');
            let fontSize = 2.4; 
            title.style.fontSize = fontSize + 'em';
            while (title.scrollWidth > title.offsetWidth && fontSize > 1) {
                fontSize -= 0.1;
                title.style.fontSize = fontSize + 'em';
            }
        }

        function checkInput(el, id) {
            const box = document.getElementById(id);
            if (el.value.trim() === "") { box.classList.add('hide-if-empty'); } 
            else { box.classList.remove('hide-if-empty'); }
        }

        // Initialize empty boxes
        document.querySelectorAll('.detail-box input').forEach(inp => {
            if(inp.placeholder.includes("Enter")) inp.parentElement.classList.add('hide-if-empty');
        });

        function addNewRow() {
            const tbody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="item-desc" placeholder="..."></td>
                <td><input type="number" class="item-num rate" value="0.00" oninput="updateCalculation()"></td>
                <td><input type="number" class="item-num qty" value="1" oninput="updateCalculation()"></td>
                <td style="text-align: right; font-weight: bold;"><span class="subtotal">0.00</span></td>
                <td class="btn-remove"><button onclick="this.parentElement.parentElement.remove(); updateCalculation();" class="btn-remove">×</button></td>
            `;
            tbody.appendChild(row);
        }

        function updateCalculation() {
            let total = 0;
            document.querySelectorAll('#tableBody tr').forEach(row => {
                const rate = parseFloat(row.querySelector('.rate').value) || 0;
                const qty = parseFloat(row.querySelector('.qty').value) || 0;
                const sub = rate * qty;
                row.querySelector('.subtotal').innerText = sub.toFixed(2);
                total += sub;
            });
            document.getElementById('grandTotal').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            document.body.classList.add('pdf-mode');
            const opt = {
                margin: 0,
                filename: 'Invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().from(element).set(opt).save().then(() => {
                document.body.classList.remove('pdf-mode');
            });
        }
        addNewRow();
    </script>
</body>
</html>
