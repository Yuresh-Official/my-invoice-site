<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Auto Parts Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica', sans-serif; background-color: #f4f4f4; padding: 20px; }
        
        .no-print { max-width: 800px; margin: 0 auto 20px; text-align: center; }
        .download-btn { background: #2563eb; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        .invoice-box { 
            width: 800px; 
            margin: auto; 
            background: #fff; 
            padding: 40px; 
            min-height: 1050px;
            border-top: 10px solid #000;
        }

        .header-section { margin-bottom: 30px; }
        .comp-name { font-size: 30px; font-weight: 900; color: #000; text-transform: uppercase; }
        .comp-info { font-size: 12px; color: #555; margin-top: 5px; font-weight: bold; }
        
        .invoice-title { font-size: 40px; font-weight: 900; color: #eee; text-align: right; margin-top: -50px; }

        .client-info { margin-top: 40px; border-bottom: 2px solid #000; padding-bottom: 15px; display: flex; justify-content: space-between; }
        .input-line { border: none; border-bottom: 1px solid #ccc; outline: none; padding: 3px; font-size: 16px; font-weight: bold; }

        .items-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .items-table th { background: #f0f0f0; border-bottom: 2px solid #000; padding: 12px; text-align: left; font-size: 14px; text-transform: uppercase; }
        .items-table td { border-bottom: 1px solid #eee; padding: 15px 12px; }
        
        .item-input { border: none; width: 100%; font-size: 15px; outline: none; }
        .num-input { border: 1px solid #eee; width: 80px; padding: 5px; text-align: center; border-radius: 4px; }
        
        .add-row-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; }

        .footer-section { margin-top: 50px; display: flex; justify-content: flex-end; }
        .total-container { background: #000; color: #fff; padding: 20px 40px; border-radius: 5px; text-align: right; }
        .total-label { font-size: 18px; margin-right: 20px; }
        .total-amount { font-size: 26px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="no-print">
        <button class="download-btn" onclick="generatePDF()">DOWNLOAD INVOICE (PDF)</button>
    </div>

    <div class="invoice-box" id="invoice">
        <div class="header-section">
            <div class="comp-name">KUMARA AUTO MOBILE</div>
            <div class="comp-info">DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS</div>
            <div class="comp-info">Tel: 0565762783 | UAE</div>
            <div class="invoice-title">INVOICE</div>
        </div>

        <div class="client-info">
            <div>M/s: <input type="text" class="input-line" style="width: 300px;" placeholder="Customer Name"></div>
            <div>Date: <input type="text" id="date" class="input-line" style="width: 120px; text-align: right;"></div>
        </div>

        <table class="items-table">
            <thead>
                <tr>
                    <th width="50%">Description</th>
                    <th width="15%">Rate</th>
                    <th width="10%">Qty</th>
                    <th width="25%" style="text-align: right;">Amount</th>
                </tr>
            </thead>
            <tbody id="item-list">
                <tr>
                    <td><input type="text" class="item-input" placeholder="Item details..."></td>
                    <td><input type="number" class="num-input rate" value="0" oninput="calculate()"></td>
                    <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                    <td align="right" style="font-weight: bold;"><span class="subtotal">0.00</span></td>
                </tr>
            </tbody>
        </table>

        <button class="add-row-btn no-print" onclick="addRow()">+ Add New Item</button>

        <div class="footer-section">
            <div class="total-container">
                <span class="total-label">GRAND TOTAL:</span>
                <span class="total-amount" id="grand-total">0.00</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('date').value = new Date().toLocaleDateString();

        function addRow() {
            const table = document.getElementById('item-list');
            const row = table.insertRow();
            row.innerHTML = `
                <td><input type="text" class="item-input" placeholder="Item details..."></td>
                <td><input type="number" class="num-input rate" value="0" oninput="calculate()"></td>
                <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                <td align="right" style="font-weight: bold;"><span class="subtotal">0.00</span></td>
            `;
        }

        // ගණනය කිරීම් සිදුකරන ප්‍රධාන කොටස
        function calculate() {
            const rates = document.getElementsByClassName('rate');
            const qtys = document.getElementsByClassName('qty');
            const subtotals = document.getElementsByClassName('subtotal');
            let total = 0;

            for (let i = 0; i < rates.length; i++) {
                // Rate සහ Qty අගයන් ලබාගෙන ඒවා වැඩි කිරීම
                let r = parseFloat(rates[i].value) || 0;
                let q = parseFloat(qtys[i].value) || 0;
                let sub = r * q;
                
                // එක් පේළියක එකතුව පෙන්වීම
                subtotals[i].innerText = sub.toFixed(2);
                
                // මුළු එකතුවට එකතු කිරීම
                total += sub;
            }

            // Grand Total එක පෙන්වීම
            document.getElementById('grand-total').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function generatePDF() {
            const element = document.getElementById('invoice');
            const opt = {
                margin: 0.3,
                filename: 'Kumara_Auto_Invoice.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
