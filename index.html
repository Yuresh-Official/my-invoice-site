<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; padding: 40px; }
        .invoice-wrapper { max-width: 850px; margin: auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .logo-box { width: 150px; height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .top-right { text-align: right; }
        .invoice-no { font-size: 28px; font-weight: bold; color: #1e293b; letter-spacing: 2px; }
        
        .bill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 30px; }
        textarea { width: 100%; border: 1px solid #eee; padding: 10px; border-radius: 4px; resize: none; font-size: 14px; font-family: inherit; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1e293b; color: white; padding: 12px; text-align: left; text-transform: uppercase; font-size: 13px; }
        td { border-bottom: 1px solid #eee; padding: 12px; }
        
        /* Input Styles - ඉලක්කම් ඇතුළත් කරන කොටු වෙනස් කිරීම */
        input { border: none; width: 100%; font-size: 14px; outline: none; padding: 5px; }
        input:focus { background: #f0f7ff; border-radius: 2px; }
        
        /* Chrome, Safari, Edge, Opera වල ඊතල ඉවත් කිරීම */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .add-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; transition: 0.2s; }
        .add-btn:hover { background: #059669; }

        .download-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; margin-bottom: 25px; transition: 0.2s; }
        .download-btn:hover { background: #1d4ed8; }
        
        .totals { margin-top: 40px; text-align: right; border-top: 2px solid #1e293b; padding-top: 20px; }
        .total-row { display: flex; justify-content: flex-end; gap: 50px; font-size: 22px; font-weight: bold; color: #1e293b; }
        
        .no-print { display: block; max-width: 850px; margin: 0 auto 10px auto; }
    </style>
</head>
<body>

    <div class="no-print">
        <button class="download-btn" onclick="downloadInvoice()">Download Invoice (PDF)</button>
    </div>

    <div class="invoice-wrapper" id="invoice-content">
        <div class="header-grid">
            <div class="logo-box" onclick="document.getElementById('fileInput').click()">
                <span id="logo-text">Click to Add Logo</span>
                <img id="logo-img" src="" style="display:none;">
                <input type="file" id="fileInput" style="display:none;" onchange="loadLogo(event)">
            </div>
            <div class="top-right">
                <div class="invoice-no">INVOICE</div>
                <input type="text" placeholder="# INV-001" style="text-align: right; font-size: 18px; font-weight: bold; color: #64748b;">
                <p style="margin-top:10px;">Date: <input type="date" id="inv-date" style="width: 140px; color: #64748b;"></p>
            </div>
        </div>

        <div class="bill-grid">
            <div>
                <strong style="color: #475569;">Who is this from?</strong>
                <textarea rows="3" placeholder="Business Name&#10;Address&#10;Phone Number"></textarea>
            </div>
            <div>
                <strong style="color: #475569;">Who is this to?</strong>
                <textarea rows="3" placeholder="Customer Name&#10;Address"></textarea>
            </div>
        </div>

        <table id="item-table">
            <thead>
                <tr>
                    <th width="50%">Description</th>
                    <th width="15%">Rate (Rs.)</th>
                    <th width="15%">Qty</th>
                    <th width="20%">Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" placeholder="Item/Service name..."></td>
                    <td><input type="number" class="rate" placeholder="0.00" oninput="calculate()"></td>
                    <td><input type="number" class="qty" placeholder="1" oninput="calculate()"></td>
                    <td class="row-total" style="font-weight: bold; color: #334155;">0.00</td>
                </tr>
            </tbody>
        </table>

        <button class="add-btn no-print" onclick="addRow()">+ Add Line Item</button>

        <div class="totals">
            <div class="total-row">
                <span>Total Amount:</span>
                <span id="grand-total">0.00</span>
            </div>
        </div>
    </div>

    <script>
        // වර්තමාන දිනය ස්වයංක්‍රීයව ඇතුළත් කිරීම
        document.getElementById('inv-date').valueAsDate = new Date();

        function addRow() {
            let table = document.getElementById("item-table").getElementsByTagName('tbody')[0];
            let row = table.insertRow();
            row.innerHTML = `
                <td><input type="text" placeholder="Item/Service name..."></td>
                <td><input type="number" class="rate" placeholder="0.00" oninput="calculate()"></td>
                <td><input type="number" class="qty" placeholder="1" oninput="calculate()"></td>
                <td class="row-total" style="font-weight: bold; color: #334155;">0.00</td>
            `;
        }

        function calculate() {
            let rates = document.getElementsByClassName("rate");
            let qtys = document.getElementsByClassName("qty");
            let rowTotals = document.getElementsByClassName("row-total");
            let grandTotal = 0;

            for (let i = 0; i < rates.length; i++) {
                let r = parseFloat(rates[i].value) || 0;
                let q = parseFloat(qtys[i].value) || 0;
                let amount = r * q;
                rowTotals[i].innerText = amount.toFixed(2);
                grandTotal += amount;
            }
            document.getElementById("grand-total").innerText = grandTotal.toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function loadLogo(event) {
            let img = document.getElementById('logo-img');
            let text = document.getElementById('logo-text');
            img.src = URL.createObjectURL(event.target.files[0]);
            img.style.display = "block";
            text.style.display = "none";
        }

        function downloadInvoice() {
            const element = document.getElementById('invoice-content');
            const opt = {
                margin: [0.5, 0.5],
                filename: 'Invoice_Report.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
