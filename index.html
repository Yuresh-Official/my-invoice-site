<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; padding: 40px; }
        .invoice-wrapper { max-width: 850px; margin: auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .logo-box { width: 150px; height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .logo-box img { max-width: 100%; max-height: 100%; }
        
        .top-right { text-align: right; }
        .invoice-no { font-size: 24px; font-weight: bold; color: #333; }
        
        .bill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 30px; }
        textarea { width: 100%; border: 1px solid #eee; padding: 10px; border-radius: 4px; resize: none; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1e293b; color: white; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px; }
        
        input { border: none; width: 100%; font-size: 14px; outline: none; }
        input:focus { background: #f9fafb; }

        .add-btn { background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        .download-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        
        .totals { margin-top: 30px; text-align: right; font-size: 18px; }
        .total-row { display: flex; justify-content: flex-end; gap: 50px; margin-top: 10px; font-weight: bold; }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

    <button class="download-btn no-print" onclick="downloadInvoice()">Download Invoice (PDF)</button>

    <div class="invoice-wrapper" id="invoice-content">
        <div class="header-grid">
            <div class="logo-box" onclick="document.getElementById('fileInput').click()">
                <span id="logo-text">Click to Add Logo</span>
                <img id="logo-img" src="" style="display:none;">
                <input type="file" id="fileInput" style="display:none;" onchange="loadLogo(event)">
            </div>
            <div class="top-right">
                <div class="invoice-no">INVOICE</div>
                <input type="text" placeholder="# Invoice Number" style="text-align: right; font-size: 18px; margin-top: 10px;">
                <p>Date: <input type="date" id="inv-date" style="width: 130px;"></p>
            </div>
        </div>

        <div class="bill-grid">
            <div>
                <strong>Who is this from?</strong>
                <textarea rows="3" placeholder="Your Business Details..."></textarea>
            </div>
            <div>
                <strong>Who is this to?</strong>
                <textarea rows="3" placeholder="Customer Details..."></textarea>
            </div>
        </div>

        <table id="item-table">
            <thead>
                <tr>
                    <th width="60%">Description</th>
                    <th width="15%">Rate</th>
                    <th width="10%">Qty</th>
                    <th width="15%">Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" placeholder="Item/Service name..."></td>
                    <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
                    <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
                    <td class="row-total">0.00</td>
                </tr>
            </tbody>
        </table>

        <button class="add-btn no-print" onclick="addRow()">+ Line Item</button>

        <div class="totals">
            <div class="total-row">
                <span>Total:</span>
                <span id="grand-total">0.00</span>
            </div>
        </div>
    </div>

    <script>
        // දින සැකසීම
        document.getElementById('inv-date').valueAsDate = new Date();

        function addRow() {
            let table = document.getElementById("item-table").getElementsByTagName('tbody')[0];
            let row = table.insertRow();
            row.innerHTML = `
                <td><input type="text" placeholder="Item/Service name..."></td>
                <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
                <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
                <td class="row-total">0.00</td>
            `;
        }

        function calculate() {
            let rates = document.getElementsByClassName("rate");
            let qtys = document.getElementsByClassName("qty");
            let rowTotals = document.getElementsByClassName("row-total");
            let grandTotal = 0;

            for (let i = 0; i < rates.length; i++) {
                let amount = rates[i].value * qtys[i].value;
                rowTotals[i].innerText = amount.toFixed(2);
                grandTotal += amount;
            }
            document.getElementById("grand-total").innerText = grandTotal.toFixed(2);
        }

        function loadLogo(event) {
            let img = document.getElementById('logo-img');
            let text = document.getElementById('logo-text');
            img.src = URL.createObjectURL(event.target.files[0]);
            img.style.display = "block";
            text.style.display = "none";
        }

        function downloadInvoice() {
            const element = document.getElementById('invoice-content');
            html2pdf().from(element).set({
                margin: [0.5, 0.5],
                filename: 'invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            }).save();
        }
    </script>
</body>
</html>
