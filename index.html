<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auto Parts Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --invoice-width: 794px; 
            --invoice-height: 1123px; 
            --primary-color: #1a73e8; 
            --secondary-color: #f8f9fa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: #e9ecef; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .no-print-area { width: 100%; max-width: 900px; margin-bottom: 20px; }
        .download-btn { width: 100%; background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .download-btn:hover { background: #1557b0; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.4); }

        .main-container { display: flex; gap: 20px; width: 100%; max-width: 1250px; justify-content: center; }

        #invoice-wrapper { 
            background: white; 
            width: var(--invoice-width); 
            min-height: var(--invoice-height); 
            padding: 0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
        }

        .preview-box { width: 320px; height: 450px; border: 2px solid #ced4da; border-radius: 12px; position: sticky; top: 20px; background: #fff; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .preview-content { transform: scale(0.4); transform-origin: top left; pointer-events: none; }

        .top-stripe { background: var(--primary-color); height: 15px; width: 100%; }
        
        .header { padding: 40px; display: flex; justify-content: space-between; align-items: center; background: var(--secondary-color); border-bottom: 1px solid #dee2e6; }
        .company-info h1 { font-size: 28px; font-weight: 800; color: #202124; text-transform: uppercase; margin-bottom: 5px; }
        .company-info p { font-size: 12px; color: #5f6368; font-weight: 600; line-height: 1.5; }
        
        /* 1:1 Logo Style */
        .logo-container {
            width: 100px;
            height: 100px;
            border: 2px dashed #1a73e8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            background: #fff;
            transition: 0.2s;
        }
        .logo-container:hover { border-color: #1557b0; background: #f1f3f4; }
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* පින්තූරය කොටුවට සරිලන සේ කැපී පෙනේ */
            display: none;
        }
        .logo-placeholder { font-size: 11px; color: var(--primary-color); font-weight: bold; text-align: center; padding: 5px; }

        .client-info { padding: 40px; display: flex; justify-content: space-between; font-size: 14px; background: #fff; }
        .input-line { border: none; border-bottom: 2px solid #eee; outline: none; padding: 5px 0; font-weight: 700; width: 250px; font-size: 15px; transition: 0.3s; }
        .input-line:focus { border-bottom-color: var(--primary-color); }

        .items-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .items-table th { 
            background: #202124; 
            color: #fff;
            padding: 15px 10px; 
            font-size: 13px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .items-table th:first-child { text-align: left; padding-left: 40px; } 
        .items-table th:last-child { text-align: right; padding-right: 40px; } 

        .items-table td { padding: 15px 10px; border-bottom: 1px solid #f1f3f4; text-align: center; }
        .items-table td:first-child { text-align: left; padding-left: 40px; }
        .items-table td:last-child { text-align: right; padding-right: 40px; font-weight: 700; color: #202124; }
        
        .item-input { border: none; width: 100%; outline: none; font-size: 14px; font-weight: 500; background: transparent; }
        .num-input { width: 85px; padding: 8px; border: 1px solid #dadce0; border-radius: 6px; text-align: center; font-size: 14px; outline: none; }

        .add-row { margin: 25px 40px; background: #34a853; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .add-row:hover { background: #2d8a46; transform: translateY(-1px); }

        .footer { margin-top: 50px; padding: 0 40px 60px; display: flex; justify-content: flex-end; }
        .total-container { 
            background: var(--secondary-color);
            border-left: 5px solid var(--primary-color);
            padding: 20px 30px;
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            border-radius: 4px;
        }
        .total-label { font-size: 13px; font-weight: 700; color: #5f6368; margin-bottom: 5px; }
        .total-amount { font-size: 28px; font-weight: 900; color: var(--primary-color); }

        /* PDF Cleanup */
        .pdf-mode .logo-container { border: none !important; }
        .pdf-mode .logo-placeholder, .pdf-mode .add-row { display: none !important; }
        .pdf-mode .num-input { border: none !important; appearance: none; -moz-appearance: textfield; }

    </style>
</head>
<body>

    <div class="no-print-area">
        <button class="download-btn" onclick="generatePDF()">DOWNLOAD HIGH-QUALITY PDF</button>
    </div>

    <div class="main-container">
        <div id="invoice-wrapper">
            <div class="top-stripe"></div>
            <div class="header">
                <div class="company-info">
                    <h1>KUMARA AUTO MOBILE</h1>
                    <p>DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS</p>
                    <p>Tel: 0565762783 | UAE</p>
                </div>
                
                <div class="logo-container" onclick="document.getElementById('logo-input').click()">
                    <span class="logo-placeholder" id="placeholder-text">Click to Add<br>Square Logo<br>(1:1)</span>
                    <img id="logo-img" src="" alt="Logo">
                    <input type="file" id="logo-input" accept="image/*" style="display: none;" onchange="loadLogo(event)">
                </div>
            </div>

            <div class="client-info">
                <div>
                    <label style="display:block; font-size:11px; color:#1a73e8; font-weight:800;">BILL TO</label>
                    <input type="text" class="input-line" placeholder="Customer Name">
                </div>
                <div style="text-align: right;">
                    <label style="display:block; font-size:11px; color:#5f6368; font-weight:800;">DATE</label>
                    <input type="text" id="cur-date" class="input-line" style="width: 120px; text-align: right;">
                </div>
            </div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th width="50%">Description</th>
                        <th width="15%">Rate</th>
                        <th width="10%">Qty</th>
                        <th width="25%">Amount</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td><input type="text" class="item-input" placeholder="Enter item details..."></td>
                        <td><input type="number" class="num-input rate" value="0.00" oninput="calculate()"></td>
                        <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                        <td><span class="subtotal">0.00</span></td>
                    </tr>
                </tbody>
            </table>
            
            <button class="add-row no-print" onclick="addNewRow()">+ ADD NEW ITEM</button>

            <div class="footer">
                <div class="total-container">
                    <span class="total-label">GRAND TOTAL</span>
                    <span class="total-amount" id="final-total">0.00</span>
                </div>
            </div>
        </div>

        <div class="preview-box no-print-area">
            <div style="background: #202124; color: white; text-align: center; font-size: 11px; padding: 8px; font-weight: bold; letter-spacing: 1px;">LIVE PREVIEW</div>
            <div id="preview-display" class="preview-content"></div>
        </div>
    </div>

    <script>
        document.getElementById('cur-date').value = new Date().toLocaleDateString();

        function loadLogo(event) {
            const image = document.getElementById('logo-img');
            const placeholder = document.getElementById('placeholder-text');
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    image.src = e.target.result;
                    image.style.display = 'block';
                    placeholder.style.display = 'none';
                    setTimeout(syncPreview, 100);
                }
                reader.readAsDataURL(file);
            }
        }

        function addNewRow() {
            const body = document.getElementById('table-body');
            const row = body.insertRow();
            row.innerHTML = `
                <td><input type="text" class="item-input" placeholder="Enter item details..."></td>
                <td><input type="number" class="num-input rate" value="0.00" oninput="calculate()"></td>
                <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                <td style="font-weight: bold;"><span class="subtotal">0.00</span></td>
            `;
            syncPreview();
        }

        function calculate() {
            const rates = document.getElementsByClassName('rate');
            const qtys = document.getElementsByClassName('qty');
            const subs = document.getElementsByClassName('subtotal');
            let grand = 0;

            for(let i=0; i < rates.length; i++) {
                let val = (parseFloat(rates[i].value) || 0) * (parseFloat(qtys[i].value) || 0);
                subs[i].innerText = val.toFixed(2);
                grand += val;
            }
            document.getElementById('final-total').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
            syncPreview();
        }

        function syncPreview() {
            const wrapper = document.getElementById('invoice-wrapper');
            const clone = wrapper.cloneNode(true);
            const originalInputs = wrapper.querySelectorAll('input');
            const clonedInputs = clone.querySelectorAll('input');
            originalInputs.forEach((input, index) => {
                clonedInputs[index].value = input.value;
            });
            document.getElementById('preview-display').innerHTML = '';
            document.getElementById('preview-display').appendChild(clone);
        }

        syncPreview();

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            element.classList.add('pdf-mode');
            
            const opt = {
                margin: 0,
                filename: 'Kumara_Auto_Premium_Invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 4, 
                    useCORS: true, 
                    letterRendering: true,
                    scrollX: 0,
                    scrollY: 0
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().from(element).set(opt).save().then(() => {
                element.classList.remove('pdf-mode');
            });
        }
    </script>
</body>
</html>
