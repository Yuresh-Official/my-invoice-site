<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Auto Parts Invoice with Logo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --invoice-width: 794px; --invoice-height: 1123px; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .no-print-area { width: 100%; max-width: 900px; margin-bottom: 20px; }
        .download-btn { width: 100%; background: #1a73e8; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }

        .main-container { display: flex; gap: 20px; width: 100%; max-width: 1250px; justify-content: center; }

        #invoice-wrapper { 
            background: white; 
            width: var(--invoice-width); 
            min-height: var(--invoice-height); 
            padding: 0; 
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        .preview-box { width: 300px; height: 424px; border: 2px solid #ccc; border-radius: 8px; position: sticky; top: 20px; background: #fff; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .preview-content { transform: scale(0.37); transform-origin: top left; pointer-events: none; }

        .top-stripe { background: #000; height: 12px; width: 100%; }
        .header { padding: 40px; display: flex; justify-content: space-between; align-items: flex-start; }
        .company-info h1 { font-size: 26px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .company-info p { font-size: 11px; color: #444; font-weight: 600; line-height: 1.4; }
        
        /* Logo එක තබන ස්ථානය (ඔබ පෙන්වූ කොටුව) */
        .logo-container {
            width: 180px;
            height: 100px;
            border: 2px dashed #ddd; /* වෙබ් එකේදී පමණක් පෙනෙන මායිමක් */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        .logo-container:hover { border-color: #aaa; background-color: #f9f9f9; }
        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* පින්තූරයේ හැඩය ආරක්ෂා කරයි */
            display: none; /* මුලින් සඟවා ඇත */
        }
        .logo-placeholder { font-size: 12px; color: #aaa; font-weight: bold; text-align: center; }

        .client-info { padding: 0 40px; margin-bottom: 30px; display: flex; justify-content: space-between; font-size: 14px; }
        .input-line { border: none; border-bottom: 1px solid #ddd; outline: none; padding: 2px; font-weight: bold; width: 220px; background: transparent; }

        .items-table { width: 100%; border-collapse: collapse; }
        
        .items-table th { 
            background: #f9f9f9; 
            border-top: 2px solid #000; 
            border-bottom: 2px solid #000; 
            padding: 12px 10px; 
            font-size: 12px; 
            text-align: center; 
        }
        .items-table th:first-child { text-align: left; padding-left: 40px; } 
        .items-table th:last-child { text-align: right; padding-right: 40px; } 

        .items-table td { 
            padding: 10px; 
            border-bottom: 1px solid #eee; 
            text-align: center; 
            vertical-align: middle;
        }
        .items-table td:first-child { text-align: left; padding-left: 40px; }
        .items-table td:last-child { text-align: right; padding-right: 40px; }
        
        .item-input { border: none; width: 100%; outline: none; font-size: 14px; background: transparent; }
        
        .num-input { 
            width: 80px; 
            padding: 6px; 
            border: 1px solid #e0e0e0; 
            border-radius: 4px; 
            text-align: center; 
            font-size: 14px;
            outline: none;
            background: transparent;
        }

        .no-print { display: block; } 

        .add-row { margin: 20px 40px; background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .add-row:hover { background: #218838; }

        .footer { margin-top: 40px; padding: 0 40px 60px; display: flex; justify-content: flex-end; }
        .total-container { 
            border-top: 2px solid #000;
            padding-top: 15px;
            width: 250px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-label { font-size: 14px; font-weight: 700; color: #555; }
        .total-amount { font-size: 24px; font-weight: 800; color: #000; }

        /* PDF එකට බලපාන විශේෂ නීති */
        @media print {
            .logo-container { border: none !important; } /* PDF එකේදී Logo එකේ කඩ ඉර (dashed border) ඉවත් කරයි */
            .logo-placeholder { display: none !important; }
        }
        .pdf-mode .logo-container { border: none !important; }
        .pdf-mode .logo-placeholder { display: none !important; }
        .pdf-mode .num-input { border: none !important; font-weight: 600; }

    </style>
</head>
<body>

    <div class="no-print-area">
        <button class="download-btn" onclick="generatePDF()">DOWNLOAD PDF INVOICE</button>
    </div>

    <div class="main-container">
        <div id="invoice-wrapper">
            <div class="top-stripe"></div>
            <div class="header">
                <div class="company-info">
                    <h1>KUMARA AUTO MOBILE</h1>
                    <p>DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS</p>
                    <p>Tel: 0565762783 | UAE</p>
                </div>
                
                <div class="logo-container" onclick="document.getElementById('logo-input').click()">
                    <span class="logo-placeholder" id="placeholder-text">+ Add Your Logo<br>(PNG recommended)</span>
                    <img id="logo-img" src="" alt="Company Logo">
                    <input type="file" id="logo-input" accept="image/png, image/jpeg" style="display: none;" onchange="loadLogo(event)">
                </div>
            </div>

            <div class="client-info">
                <div>M/s: <input type="text" class="input-line" placeholder="Enter Customer Name"></div>
                <div>Date: <input type="text" id="cur-date" class="input-line" style="width: 100px; text-align: right;"></div>
            </div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th width="50%">Description</th>
                        <th width="15%">Rate</th>
                        <th width="10%">Qty</th>
                        <th width="25%">Amount</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td><input type="text" class="item-input" placeholder="Item description..."></td>
                        <td><input type="number" class="num-input rate" value="0" oninput="calculate()"></td>
                        <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                        <td style="font-weight: bold;"><span class="subtotal">0.00</span></td>
                    </tr>
                </tbody>
            </table>
            
            <button class="add-row no-print" onclick="addNewRow()">+ Add Item</button>

            <div class="footer">
                <div class="total-container">
                    <span class="total-label">GRAND TOTAL :</span>
                    <span class="total-amount" id="final-total">0.00</span>
                </div>
            </div>
        </div>

        <div class="preview-box no-print-area">
            <div style="background: #333; color: white; text-align: center; font-size: 12px; padding: 5px;">LIVE PREVIEW</div>
            <div id="preview-display" class="preview-content"></div>
        </div>
    </div>

    <script>
        document.getElementById('cur-date').value = new Date().toLocaleDateString();

        // Logo එක පූරණය කිරීමේ function එක
        function loadLogo(event) {
            const image = document.getElementById('logo-img');
            const placeholder = document.getElementById('placeholder-text');
            const file = event.target.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    image.src = e.target.result;
                    image.style.display = 'block';
                    placeholder.style.display = 'none';
                    syncPreview(); // Preview එකත් update කරන්න
                }
                reader.readAsDataURL(file);
            }
        }

        function addNewRow() {
            const body = document.getElementById('table-body');
            const row = body.insertRow();
            row.innerHTML = `
                <td><input type="text" class="item-input" placeholder="Item description..."></td>
                <td><input type="number" class="num-input rate" value="0" oninput="calculate()"></td>
                <td><input type="number" class="num-input qty" value="0" oninput="calculate()"></td>
                <td style="font-weight: bold;"><span class="subtotal">0.00</span></td>
            `;
            syncPreview();
        }

        function calculate() {
            const rates = document.getElementsByClassName('rate');
            const qtys = document.getElementsByClassName('qty');
            const subs = document.getElementsByClassName('subtotal');
            let grand = 0;

            for(let i=0; i < rates.length; i++) {
                let val = (parseFloat(rates[i].value) || 0) * (parseFloat(qtys[i].value) || 0);
                subs[i].innerText = val.toFixed(2);
                grand += val;
            }
            document.getElementById('final-total').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
            syncPreview();
        }

        function syncPreview() {
            // පින්තූරය ඇතුළු සියලුම දේ Preview එකට කොපි කිරීම
            const wrapper = document.getElementById('invoice-wrapper');
            const clone = wrapper.cloneNode(true);
            
            // Preview එකේදී input fields වල අගයන් නිවැරදිව පෙන්වීමට
            const originalInputs = wrapper.querySelectorAll('input');
            const clonedInputs = clone.querySelectorAll('input');
            originalInputs.forEach((input, index) => {
                clonedInputs[index].value = input.value;
            });

            document.getElementById('preview-display').innerHTML = '';
            document.getElementById('preview-display').appendChild(clone);
        }

        syncPreview();

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            
            element.classList.add('pdf-mode');
            const noPrintElements = element.querySelectorAll('.no-print');
            noPrintElements.forEach(el => el.style.display = 'none');

            // Logo එකක් නැත්නම් ඒ කොටුව සම්පූර්ණයෙන්ම සඟවන්න (හිස් අවකාශය ඉතිරි නොකිරීමට)
            const logoImg = document.getElementById('logo-img');
            const logoContainer = element.querySelector('.logo-container');
            if (logoImg.style.display === 'none' || !logoImg.src) {
                logoContainer.style.display = 'none';
            }

            const opt = {
                margin: 0,
                filename: 'Kumara_Auto_Invoice.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, width: 794 }, // Resolution එක වැඩි කළා
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().from(element).set(opt).save().then(() => {
                element.classList.remove('pdf-mode');
                noPrintElements.forEach(el => el.style.display = 'block');
                logoContainer.style.display = 'flex'; // නැවත පෙන්වන්න
            });
        }
    </script>
</body>
</html>
