<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumara Auto Mobile - Professional Invoice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --invoice-width: 800px; 
            --primary-black: #000000;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #525659; display: flex; flex-direction: column; align-items: center; padding: 40px 0; }

        .control-panel { width: var(--invoice-width); margin-bottom: 20px; display: flex; gap: 10px; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .download-btn { background: #27ae60; color: white; flex-grow: 1; }
        .add-btn { background: #2980b9; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        #invoice-wrapper { 
            background: white; 
            width: var(--invoice-width); 
            min-height: 1120px;
            padding: 0; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Black Header Section */
        .header-box {
            background: var(--primary-black);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .company-name { font-size: 38px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .sub-header { font-size: 13px; font-weight: 400; opacity: 0.9; margin-bottom: 5px; }
        .contact-info { font-size: 16px; font-weight: 600; }
        .uae-tag { position: absolute; right: 40px; top: 120px; font-size: 30px; font-weight: 900; color: white; }

        /* Invoice Label Watermark */
        .invoice-label { 
            position: absolute; 
            top: 170px; 
            right: 40px; 
            font-size: 60px; 
            font-weight: 900; 
            color: rgba(0,0,0,0.05); 
            text-transform: uppercase; 
            pointer-events: none;
        }

        .main-content { padding: 40px 50px; flex-grow: 1; }

        /* Bill Details */
        .bill-details { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .input-group label { font-size: 14px; font-weight: 800; color: #000; margin-right: 5px; }
        .editable-input { border: none; border-bottom: 1.5px solid #000; padding: 2px 0; font-size: 15px; outline: none; width: 250px; }

        /* Table Styling */
        .items-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .items-table th { background: var(--primary-black); color: white; padding: 12px; text-align: left; font-size: 14px; text-transform: uppercase; }
        .items-table td { padding: 10px; border-bottom: 1px solid #eee; }
        
        .table-input { border: none; width: 100%; padding: 5px; font-size: 14px; outline: none; background: transparent; }
        .num-input { text-align: center; }

        /* Grand Total - Clean Style */
        .total-section {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .total-hr { width: 250px; height: 2px; background: #000; margin-bottom: 10px; }
        .grand-total-box { font-size: 24px; font-weight: 800; color: #000; }

        .pdf-mode .btn, .pdf-mode .control-panel { display: none !important; }
    </style>
</head>
<body>

    <div class="control-panel">
        <button class="btn add-btn" onclick="addNewRow()">+ Add New Item</button>
        <button class="btn download-btn" onclick="generatePDF()">DOWNLOAD INVOICE (PDF)</button>
    </div>

    <div id="invoice-wrapper">
        <div class="invoice-label">INVOICE</div>

        <div class="header-box">
            <div class="company-name" contenteditable="true">KUMARA AUTO MOBILE</div>
            <div class="sub-header" contenteditable="true">DEALS IN ALL KINDS OF FORKLIFTS, JCB & HEAVY EQUIPMENT SPARE PARTS</div>
            <div class="contact-info" contenteditable="true">Tel : 0565762783 | UAE</div>
        </div>

        <div class="main-content">
            <div class="bill-details">
                <div class="input-group">
                    <label>M/s:</label>
                    <input type="text" class="editable-input" placeholder="Customer Name">
                </div>
                <div class="input-group" style="text-align: right;">
                    <label>Date:</label>
                    <input type="text" id="cur-date" class="editable-input" style="width: 120px; text-align: right;">
                </div>
            </div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th style="width: 50%;">Description</th>
                        <th style="text-align: center;">Rate</th>
                        <th style="text-align: center;">Qty</th>
                        <th style="text-align: right;">Amount</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>

            <div class="total-section">
                <div class="total-hr"></div>
                <div class="grand-total-box">
                    Grand Total : <span id="final-total">0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('cur-date').value = new Date().toLocaleDateString();

        function addNewRow() {
            const body = document.getElementById('table-body');
            const row = body.insertRow();
            row.innerHTML = `
                <td><input type="text" class="table-input" placeholder="Enter item description..."></td>
                <td><input type="number" class="table-input num-input rate" value="0" oninput="calculate()"></td>
                <td><input type="number" class="table-input num-input qty" value="1" oninput="calculate()"></td>
                <td style="text-align: right; font-weight: bold;"><span class="subtotal">0.00</span></td>
            `;
            calculate();
        }

        function calculate() {
            const rates = document.getElementsByClassName('rate');
            const qtys = document.getElementsByClassName('qty');
            const subs = document.getElementsByClassName('subtotal');
            let grand = 0;

            for(let i=0; i < rates.length; i++) {
                let val = (parseFloat(rates[i].value) || 0) * (parseFloat(qtys[i].value) || 0);
                subs[i].innerText = val.toFixed(2);
                grand += val;
            }
            document.getElementById('final-total').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function generatePDF() {
            const element = document.getElementById('invoice-wrapper');
            document.body.classList.add('pdf-mode');

            const opt = {
                margin: 0,
                filename: 'Kumara_Auto_Invoice.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().from(element).set(opt).save().then(() => {
                document.body.classList.remove('pdf-mode');
            });
        }

        addNewRow();
    </script>
</body>
</html>
